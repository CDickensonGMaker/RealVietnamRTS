<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Firebase Command Icon - Stylized Firebase/Vietnam theme -->
  <!-- Background - jungle green -->
  <rect width="128" height="128" fill="#1a3320"/>

  <!-- Firebase shape (pentagon/fortification) -->
  <polygon points="64,20 104,45 94,90 34,90 24,45" fill="none" stroke="#c4a035" stroke-width="4"/>

  <!-- Inner sandbag line -->
  <polygon points="64,30 92,50 84,82 44,82 36,50" fill="none" stroke="#8b7355" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Command post (center) -->
  <rect x="54" y="50" width="20" height="15" fill="#4a5c4a" stroke="#c4a035" stroke-width="1"/>
  <polygon points="54,50 64,42 74,50" fill="#3a4a3a" stroke="#c4a035" stroke-width="1"/>

  <!-- MG nest (left) -->
  <circle cx="40" cy="65" r="6" fill="#4a5c4a" stroke="#556b55" stroke-width="1"/>
  <line x1="40" y1="65" x2="30" y2="55" stroke="#333" stroke-width="2"/>

  <!-- MG nest (right) -->
  <circle cx="88" cy="65" r="6" fill="#4a5c4a" stroke="#556b55" stroke-width="1"/>
  <line x1="88" y1="65" x2="98" y2="55" stroke="#333" stroke-width="2"/>

  <!-- LZ marker (helicopter landing zone) -->
  <circle cx="64" cy="100" r="10" fill="none" stroke="#d35400" stroke-width="2"/>
  <text x="64" y="104" font-family="Arial" font-size="10" fill="#d35400" text-anchor="middle" font-weight="bold">H</text>

  <!-- Stars (US military reference) -->
  <polygon points="64,8 65.5,12 70,12 66.5,14.5 68,19 64,16.5 60,19 61.5,14.5 58,12 62.5,12" fill="#c4a035"/>
</svg>
