<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" fill="#2d5016"/>

  <!-- Firebase shape -->
  <polygon points="64,20 104,50 104,90 64,108 24,90 24,50" fill="#4a3728" stroke="#8b7355" stroke-width="2"/>

  <!-- Bunker -->
  <rect x="50" y="55" width="28" height="18" fill="#5c4033" stroke="#3d2817" stroke-width="1"/>

  <!-- Sandbags -->
  <ellipse cx="40" cy="70" rx="8" ry="4" fill="#8b7355"/>
  <ellipse cx="88" cy="70" rx="8" ry="4" fill="#8b7355"/>

  <!-- Helipad H -->
  <circle cx="64" cy="88" r="12" fill="#3d5c3d" stroke="#fff" stroke-width="1"/>
  <text x="64" y="93" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">H</text>

  <!-- Star -->
  <polygon points="64,8 66,14 72,14 67,18 69,24 64,20 59,24 61,18 56,14 62,14" fill="#c4a000"/>

  <!-- Title -->
  <text x="64" y="122" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">FIREBASE</text>
</svg>
