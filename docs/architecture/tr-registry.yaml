  title: "Engineer auto-build zones"
  status: "LOCKED"
  description: "Auto inside established zones, manual outside"
  source: "GAME_BIBLE.md:D-102"

DD-103:
  decision_id: "D-103"
  title: "Det-cord vs bulldozers"
  status: "LOCKED"
