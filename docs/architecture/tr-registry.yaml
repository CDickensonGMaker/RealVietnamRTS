  source: "GAME_BIBLE.md:D-005"

# Core Loop Decisions (D-101 to D-106)

DD-101:
  decision_id: "D-101"
  title: "No AoE-style unit production"
  status: "LOCKED"
  description: "Reinforcements via helicopter/convoy only, minutes not seconds"
  source: "GAME_BIBLE.md:D-101"

DD-102:
